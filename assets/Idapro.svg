<!-- idapro.svg -->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#0D1117"/>

  <!-- Classic IDA style circle -->
  <circle cx="64" cy="64" r="40" fill="#1f6feb"/>

  <!-- Minimal face silhouette (clean & elegant) -->
  <path d="M64 40 
           C55 40, 50 50, 50 60 
           C50 70, 55 80, 64 80 
           C70 80, 75 70, 75 65 
           C75 60, 70 55, 65 55 
           C62 55, 60 58, 60 60"
        fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- IDA text -->
  <text x="64" y="110" text-anchor="middle" font-size="18" fill="#ffffff" font-family="Arial">
    IDA
  </text>

</svg>
